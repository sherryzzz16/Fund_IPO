name: Financial Monitor

on:
  schedule:
    # 每天 2:00 UTC 运行 (北京时间 10:00 AM)
    - cron: '0 2 * * *'
  # 允许手动触发执行
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # ！！！非常重要：赋予 GitHub Actions 写代码库的权限以保存缓存 ！！！
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run FRED Monitor Script
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          python fred_monitor.py

      - name: Run IPO Monitor Script
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          python ipo_monitor.py
          
      - name: Save IPO Status
        # 这一步执行 git commit，把更新后的 seen_ipos.json 存回 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ipos.json
          # 如果文件有变动就提交，没有变动则跳过
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto update seen_ipos cache" && git push)
