name: Financial Monitor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # 赋予写权限以保存缓存
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run IPO Monitor Script
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          # 确保文件存在，防止 git add 时找不到文件报错
          touch seen_ipos.json
          python ipo_monitor.py
          
      - name: Save IPO Status
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ipos.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto update seen_ipos cache" && git push)
